		<style>
			/* kiln mode: the same tokens the site uses in its dark scheme */
			:root {
				--kiln-deep: oklch(0.2 0.028 50); /* the field between bricks */
				--kiln: oklch(0.25 0.03 50); /* brick faces */
				--chalk: oklch(0.985 0.002 260);
				--post: oklch(0.66 0.15 237);
				--blog: oklch(0.7 0.19 45);
				--video: oklch(0.58 0.22 295);
				--video-bright: oklch(0.74 0.17 295);
			}
			* {
				margin: 0;
				box-sizing: border-box;
			}
			body {
				width: 1200px;
				height: 630px;
				background: var(--kiln-deep);
				color: var(--chalk);
				font-family: 'Bricolage Grotesque', system-ui, sans-serif;
				display: flex;
				overflow: hidden;
			}

			/* the wall itself carries the meaning: real bricks, real mortar gaps */
			.wall {
				position: absolute;
				inset: -60px;
				display: flex;
				gap: 14px;
				padding: 14px;
				transform: rotate(-3deg) scale(1.04);
				transform-origin: center;
			}
			.col {
				flex: 1;
				display: flex;
				flex-direction: column;
				gap: 14px;
			}
			.brick {
				background: var(--kiln);
				border: 2px solid;
				border-radius: 14px;
				box-shadow: 0 2px 0 0 oklch(0 0 0 / 0.35);
			}
			.post {
				border-color: color-mix(in oklch, var(--post) 60%, transparent);
			}
			.blog {
				border-color: color-mix(in oklch, var(--blog) 60%, transparent);
			}
			.video {
				border-color: color-mix(in oklch, var(--video) 60%, transparent);
			}
			.media {
				height: 55%;
				border-radius: 11px 11px 0 0;
			}
			.post .media {
				background: color-mix(in oklch, var(--post) 26%, var(--kiln));
			}
			.blog .media {
				background: color-mix(in oklch, var(--blog) 26%, var(--kiln));
			}
			.video .media {
				background: color-mix(in oklch, var(--video) 30%, var(--kiln));
				display: grid;
				place-items: center;
			}
			.play {
				width: 38px;
				height: 38px;
				border-radius: 999px;
				background: var(--video);
				display: grid;
				place-items: center;
				color: white;
				font-size: 15px;
				padding-left: 3px;
			}
			.lines {
				padding: 11px 13px;
				display: flex;
				flex-direction: column;
				gap: 7px;
			}
			.line {
				height: 7px;
				border-radius: 999px;
				background: color-mix(in oklch, var(--chalk) 22%, transparent);
			}

			/* the card sits ON the wall, opaque, like a brick that speaks */
			.plate {
				position: relative;
				margin: auto;
				background: color-mix(in oklch, var(--kiln) 92%, var(--chalk));
				border: 3px solid color-mix(in oklch, var(--chalk) 22%, transparent);
				border-radius: 28px;
				box-shadow:
					0 10px 0 0 oklch(0 0 0 / 0.45),
					0 30px 70px -20px oklch(0 0 0 / 0.6);
				padding: 44px 56px 48px;
				text-align: center;
				max-width: 780px;
			}
			h1 {
				font-size: 116px;
				font-weight: 800;
				letter-spacing: -0.035em;
				line-height: 1;
			}
			p {
				margin-top: 18px;
				font-size: 30px;
				font-weight: 400;
				line-height: 1.28;
				color: color-mix(in oklch, var(--chalk) 85%, transparent);
			}
			.kinds {
				margin-top: 26px;
				display: flex;
				gap: 12px;
				justify-content: center;
				font-size: 19px;
				font-weight: 700;
			}
			.kind {
				padding: 8px 18px;
				border-radius: 999px;
				border: 2px solid;
			}
			.k-post {
				border-color: var(--post);
				color: var(--post);
			}
			.k-blog {
				border-color: var(--blog);
				color: var(--blog);
			}
			.k-video {
				border-color: var(--video-bright);
				color: var(--video-bright);
			}
		</style>
