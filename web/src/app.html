<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="text-scale" content="scale" />

    <!-- Crawlers do not run JavaScript, and they never boot the service worker
         that IS mason's feed engine. Whatever a link preview shows has to be
         here, in the shell, or it does not exist. -->
    <title>mason · one wall, every brick</title>
    <meta
      name="description"
      content="Posts, blogs and video from everyone you follow, laid into one wall. An atproto discovery app: no login, and the feed engine runs in your own browser."
    />
    <link rel="canonical" href="https://mason.iamstan.dev/" />
    <meta name="theme-color" content="#f1f1f3" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#2a1e15" media="(prefers-color-scheme: dark)" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="mason" />
    <meta property="og:url" content="https://mason.iamstan.dev/" />
    <meta property="og:title" content="mason · one wall, every brick" />
    <meta
      property="og:description"
      content="Posts, blogs and video from everyone you follow, laid into one wall. An atproto discovery app: no login, and the feed engine runs in your own browser."
    />
    <meta property="og:image" content="https://mason.iamstan.dev/og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="A masonry wall of bricks in sky, tangerine and violet, with the mason wordmark laid over it."
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="mason · one wall, every brick" />
    <meta
      name="twitter:description"
      content="Posts, blogs and video from everyone you follow, laid into one wall."
    />
    <meta name="twitter:image" content="https://mason.iamstan.dev/og.png" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
