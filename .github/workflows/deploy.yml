name: deploy

# Two entry points, one definition. A release calls this, because cutting a
# release IS shipping; a manual dispatch covers a hotfix or a re-deploy of
# unchanged code.
on:
  workflow_call:
  workflow_dispatch:
    inputs:
      refresh:
        description: >-
          Re-upload every file, even unchanged ones. S3 writes object metadata
          only on a PUT, so content-type and tag fixes never reach objects the
          ETag check would skip. Needed once after a blogwright upgrade that
          changes metadata; invalidates the whole CDN, so leave it off otherwise.
        type: boolean
        default: false

permissions:
  id-token: write # GitHub OIDC → blogwright deploy role, no stored keys
  contents: read

env:
  AWS_REGION: eu-west-1 # keep in sync with config/production.jsonc

jobs:
  production:
    runs-on: ubuntu-latest
    environment: production # holds AWS_ACCOUNT_ID + PRODUCTION_DOMAIN secrets; gate approvals here
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Rust toolchain (wasm32)
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master 2026-07
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: server
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: wasm-pack

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      # heavy toolchain work happens here, not in the builder MicroVM -
      # the pkg rides into the deploy zip via config sourceInclude
      - name: Build wasm feed engine
        run: |
          cd server && wasm-pack build crates/mortar-wasm --target web --no-pack \
            --out-dir ../../../web/src/lib/mortar-wasm/pkg

      - name: Install web deps
        run: cd web && pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/production-mason-gh
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to production
        env:
          PRODUCTION_DOMAIN: ${{ secrets.PRODUCTION_DOMAIN }}
          REFRESH: ${{ inputs.refresh && '--refresh' || '' }}
        # --domain only when the secret is set; otherwise the CloudFront
        # default domain serves the site
        run: |
          cd web
          pnpm exec blogwright deploy production ${PRODUCTION_DOMAIN:+--domain "$PRODUCTION_DOMAIN"} $REFRESH
