name: ci

# Gate every PR and every push to main on the same checks the repo enforces
# locally: tests, lint, format, the guards, and wasm compilability. No secrets,
# so this runs on fork PRs where the preview deploy cannot.
on:
  pull_request:
  push:
    branches: [main]

# one run per ref; a new push supersedes an in-flight run
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Rust toolchain (wasm32)
        # channel comes from rust-toolchain.toml; clippy and rustfmt for the
        # lint and format gates
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.97.0"
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: server
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: just,nextest,wasm-pack@0.15.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web deps
        run: cd web && pnpm install --frozen-lockfile

      - name: Assert Cargo.lock is fresh
        run: cd server && cargo metadata --locked --format-version 1 > /dev/null

      # the web app imports the generated wasm pkg (gitignored), so build it
      # before the web checks; this also compiles mortar-core to wasm32, so it
      # doubles as the wasm compilability gate. tsc and knip need the pkg present.
      - name: Build wasm (generates web/src/lib/mortar-wasm/pkg)
        run: just wasm

      - name: Test (nextest + tsc)
        run: just test

      - name: Lint (oxlint + knip + clippy)
        run: just lint

      - name: Format check
        run: just fmt-check

      - name: Guard autoplay
        run: just guard-autoplay

      - name: Guard dashes
        run: just guard-dashes
