name: ci

# Gate every PR and every push to main on the same checks the repo enforces
# locally: tests, lint, format, the guards, and wasm compilability. No secrets,
# so this runs on fork PRs where the preview deploy cannot.
on:
  pull_request:
  push:
    branches: [main]

# one run per ref; a new push supersedes an in-flight run
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Rust toolchain (wasm32)
        # channel comes from rust-toolchain.toml; clippy and rustfmt for the
        # lint and format gates
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master 2026-07
        with:
          toolchain: "1.97.0"
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: server
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: just,nextest

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web deps
        run: cd web && pnpm install --frozen-lockfile

      - name: Test (nextest + tsc)
        run: just test

      - name: Lint (oxlint + knip + clippy)
        run: just lint

      - name: Format check
        run: just fmt-check

      - name: Guard autoplay
        run: just guard-autoplay

      - name: Guard dashes
        run: just guard-dashes

      - name: Wasm compiles
        run: cd server && cargo check --target wasm32-unknown-unknown -p mortar-core
