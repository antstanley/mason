name: release

# Changesets keeps a "Version Packages" PR open that collects every pending
# changeset. Merging it bumps the version everywhere (root, web, the Rust
# workspace and its lockfile), writes the changelog, then tags and cuts a
# GitHub release. mason publishes nothing to npm; the release IS the artifact.
on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # tag, release, and push the Version Packages branch
      pull-requests: write # open and update the Version Packages PR
    outputs:
      released: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # changesets compares against the base branch

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install (root tooling only)
        run: pnpm install --frozen-lockfile

      - uses: changesets/action@e0538e686673de0265c8a3e2904b8c76beaa43fd # v1.5.3
        id: changesets
        with:
          version: pnpm run version
          publish: pnpm run release
          commit: "chore: version mason"
          title: "chore: version mason"
          # `scripts/release.mjs` already tags the version and cuts the release
          # from the changelog. Left on, this action cuts a SECOND one for the
          # same tag and GitHub rejects it ("tag_name was used by an immutable
          # release"), which fails the job AFTER the release is live: the tag
          # ships, `published` never gets set, and the deploy that depends on it
          # is silently skipped. A release that does not deploy is the one
          # outcome this pipeline exists to prevent (see #7).
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # A release is a ship. Cutting one deploys it, so the tag, the notes and the
  # live site always describe the same code. Nothing happens on an ordinary push
  # to main: `released` is only true on the run that merges the version PR.
  deploy:
    needs: release
    if: needs.release.outputs.released == 'true'
    permissions:
      id-token: write # deploy.yml assumes its AWS role via OIDC
      contents: read
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
