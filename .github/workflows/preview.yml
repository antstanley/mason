name: preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

# one run per PR at a time; a new push cancels an in-flight deploy of the same PR
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  id-token: write # GitHub OIDC → preview-mason-gh role, no stored keys
  contents: read
  pull-requests: write # sticky preview-URL comment

env:
  AWS_REGION: eu-west-1 # keep in sync with config/preview.jsonc
  PREVIEW_ID: pr-${{ github.event.pull_request.number }}

jobs:
  deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment: preview # holds AWS_ACCOUNT_ID + PREVIEW_DOMAIN secrets
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Rust toolchain (wasm32)
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master 2026-07
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: server
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: wasm-pack

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      # heavy toolchain work happens here, not in the builder MicroVM -
      # the pkg rides into the deploy zip via config sourceInclude
      - name: Build wasm feed engine
        run: |
          cd server && wasm-pack build crates/mortar-wasm --target web --no-pack \
            --out-dir ../../../web/src/lib/mortar-wasm/pkg

      - name: Install web deps
        run: cd web && pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/preview-mason-gh
          aws-region: ${{ env.AWS_REGION }}

      # --refresh always: a preview exists to tell the truth about what
      # production will do, and object metadata (content types, tags) only
      # lands on a PUT. The preview distribution has caching disabled, so the
      # only cost is re-uploading a few MB.
      - name: Deploy preview
        run: >
          cd web && pnpm exec blogwright preview deploy "$PREVIEW_ID"
          --domain ${{ secrets.PREVIEW_DOMAIN }} --refresh

      - name: Comment preview URL
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PREVIEW_URL: https://pr-${{ github.event.pull_request.number }}.${{ secrets.PREVIEW_DOMAIN }}
        with:
          script: |
            const url = process.env.PREVIEW_URL;
            const marker = '<!-- preview-deploy -->';
            const body = `${marker}\n🧱 Preview wall deployed: ${url}\n\n_Updates on every push; removed when this PR closes._`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }

  destroy:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web deps
        run: cd web && pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/preview-mason-gh
          aws-region: ${{ env.AWS_REGION }}

      # teardown is a prefix delete; no build needed
      - name: Destroy preview
        run: cd web && pnpm exec blogwright preview destroy "$PREVIEW_ID"

      - name: Comment removal
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const marker = '<!-- preview-deploy -->';
            const body = `${marker}\n🧹 Preview wall removed.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            }
